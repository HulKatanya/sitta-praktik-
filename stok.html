<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stok Bahan Ajar - Pemesanan Bahan Ajar</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">
            <img src="assets/logo-ut.png" alt="Logo UT" class="nav-logo">
            <a href="dashboard.html" style="color: inherit; text-decoration: none;">
                <span>Pemesanan Bahan Ajar</span>
            </a>
        </div>
        <div class="nav-user">
            <span>Selamat datang!</span>
            <button class="btn-logout" onclick="logout()">
                <i class="fas fa-sign-out-alt"></i> Logout
            </button>
        </div>
    </nav>

    <div class="container">
        <div class="card" style="margin-bottom: 32px;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
                <h1 style="margin: 0; font-size: 2.25rem; color: var(--text-primary);">
                    <i class="fas fa-boxes" style="color: var(--primary-500); margin-right: 16px;"></i>
                    Informasi Stok Bahan Ajar
                </h1>
                <div id="totalStok" style="font-size: 18px; font-weight: 600; color: var(--text-secondary);">
                    <i class="fas fa-boxes"></i> Total: 0 item
                </div>
            </div>
        </div>

        <!-- Add Stock Section -->
        <div class="card">
            <h3 style="margin: 0 0 32px 0; color: var(--text-primary); font-size: 1.5rem;">
                <i class="fas fa-plus-circle" style="color: var(--secondary-500); margin-right: 12px;"></i>
                Tambah Stok Baru
            </h3>
            <form id="addStockForm">
                <div class="form-row">
                    <div class="input-group">
                        <i class="fas fa-code"></i>
                        <input type="text" id="kdMataKuliah" placeholder="Kode Mata Kuliah" required>
                    </div>
                    <div class="input-group">
                        <i class="fas fa-book"></i>
                        <input type="text" id="namaMataKuliah" placeholder="Nama Mata Kuliah" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="input-group">
                        <i class="fas fa-layer-group"></i>
                        <input type="number" id="stok" placeholder="Stok" min="0" required>
                    </div>
                    <div class="input-group">
                        <i class="fas fa-tag"></i>
                        <input type="number" id="harga" placeholder="Harga (Rp)" min="0" required>
                    </div>
                </div>
                <div style="display: flex; gap: 16px;">
                    <button type="submit" class="btn-primary" style="flex: 1;">
                        <i class="fas fa-plus"></i> Tambah Stok
                    </button>
                    <button type="reset" class="btn-secondary" style="flex: 1;">
                        <i class="fas fa-refresh"></i> Reset
                    </button>
                </div>
            </form>
        </div>

        <!-- Stock Table -->
        <div class="table-section">
            <div class="table-header" style="padding: 32px 32px 24px; border-bottom: 2px solid var(--border);">
                <h3 style="margin: 0; color: var(--text-primary); font-size: 1.5rem;">
                    <i class="fas fa-list" style="color: var(--primary-500); margin-right: 12px;"></i>
                    Daftar Stok Bahan Ajar
                </h3>
            </div>
            <div style="overflow-x: auto;">
                <table class="laporan-table">
                    <thead>
                        <tr>
                            <th style="width: 140px;">Kode MK</th>
                            <th style="width: 350px;">Nama Mata Kuliah</th>
                            <th style="width: 120px;">Stok</th>
                            <th style="width: 150px;">Harga</th>
                            <th style="width: 180px;">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="stockTableBody">
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Modal Edit Stok -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeEditModal()">&times;</span>
            <h2 style="margin-bottom: 32px; color: var(--text-primary);">
                <i class="fas fa-edit" style="color: var(--primary-500); margin-right: 12px;"></i>
                Edit Stok Bahan Ajar
            </h2>
            <form id="editStockForm">
                <input type="hidden" id="editIndex">
                <div class="form-row">
                    <div class="input-group">
                        <i class="fas fa-code"></i>
                        <input type="text" id="editKdMataKuliah" placeholder="Kode Mata Kuliah" required>
                    </div>
                    <div class="input-group">
                        <i class="fas fa-book"></i>
                        <input type="text" id="editNamaMataKuliah" placeholder="Nama Mata Kuliah" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="input-group">
                        <i class="fas fa-layer-group"></i>
                        <input type="number" id="editStok" placeholder="Stok" min="0" required>
                    </div>
                    <div class="input-group">
                        <i class="fas fa-tag"></i>
                        <input type="number" id="editHarga" placeholder="Harga (Rp)" min="0" required>
                    </div>
                </div>
                <div style="display: flex; gap: 16px; margin-top: 32px;">
                    <button type="submit" class="btn-primary" style="flex: 1;">
                        <i class="fas fa-save"></i> Update Stok
                    </button>
                    <button type="button" class="btn-secondary" onclick="closeEditModal()" style="flex: 1;">
                        <i class="fas fa-times"></i> Batal
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/script.js"></script>
    <script src="js/data.js"></script>
</body>
</html>
